<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERSONAL CA — Your Tax Preparation Workbench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F6F4EE;
  --paper:#FFFFFF;
  --ink:#1C2620;
  --ink-soft:#5B655F;
  --line:#DDD8CB;
  --primary:#1F4B43;
  --primary-dark:#153531;
  --primary-tint:#E4EDE9;
  --accent:#B8721F;
  --accent-tint:#F4E6D2;
  --green:#2F7A4F;
  --green-tint:#E4F1E8;
  --amber:#B3800F;
  --amber-tint:#FBF0DA;
  --red:#B3392C;
  --red-tint:#F8E5E2;
  --radius:10px;
  --shadow:0 1px 2px rgba(28,38,32,0.06), 0 4px 16px rgba(28,38,32,0.06);
  --display:'Source Serif 4', Georgia, serif;
  --body:'IBM Plex Sans', -apple-system, sans-serif;
  --mono:'IBM Plex Mono', 'SF Mono', monospace;
  --mobile-strip-h:48px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--ink);font-family:var(--body);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;-webkit-tap-highlight-color:rgba(31,75,67,0.15);
}
h1,h2,h3,h4{font-family:var(--display);font-weight:600;margin:0 0 8px;color:var(--ink);}
a{color:var(--primary);}
button{font-family:var(--body);}
.num,.mono{font-family:var(--mono);}
::selection{background:var(--accent-tint);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.btn,.sbtn,.hamburger-btn,.pill,.dropzone,.step-item,.ledger-num,a,label.checkbox{touch-action:manipulation;}

/* ---- MOBILE STRIP (hamburger bar) ---- */
.mobile-strip{
  position:fixed;top:0;left:0;right:0;height:var(--mobile-strip-h);
  background:var(--primary-dark);color:#EFEFE9;
  display:flex;align-items:center;gap:10px;padding:0 12px;
  z-index:90;
}
.hamburger-btn{
  background:none;border:none;color:#EFEFE9;font-size:22px;cursor:pointer;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;flex-shrink:0;
}
.hamburger-btn:active{background:rgba(255,255,255,0.1);}
.mobile-strip-brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;}
.brand-mark-sm{
  width:28px;height:28px;border-radius:6px;background:var(--accent);
  color:#221605;font-family:var(--display);font-weight:700;font-size:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ---- DRAWER OVERLAY ---- */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(20,26,22,0.5);z-index:95;
  opacity:0;pointer-events:none;transition:opacity .25s;
  -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
}
.drawer-overlay.open{opacity:1;pointer-events:auto;}

/* ---- SIDEBAR (drawer on mobile, permanent on tablet+) ---- */
.sidebar{
  width:280px;flex-shrink:0;background:var(--primary-dark);color:#EFEFE9;
  padding:24px 0;overflow-y:auto;z-index:100;
  position:fixed;top:0;left:0;height:100vh;
  transform:translateX(-100%);transition:transform .25s ease;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.sidebar.open{transform:translateX(0);}
.brand{padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:8px;}
.brand-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:8px;background:var(--accent);
  color:#221605;font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:10px;
}
.brand h1{font-size:19px;color:#fff;margin:0;}
.brand p{margin:2px 0 0;font-size:11.5px;color:#B9C7C0;letter-spacing:.03em;text-transform:uppercase;}
.step-list{list-style:none;margin:8px 0 0;padding:0;}
.step-item{
  display:flex;gap:10px;align-items:flex-start;padding:10px 24px;cursor:pointer;
  border-left:3px solid transparent;transition:background .15s;
}
.step-item:hover{background:rgba(255,255,255,0.05);}
.step-item:active{background:rgba(255,255,255,0.12);}
.step-item.active{background:rgba(255,255,255,0.09);border-left-color:var(--accent);}
.step-item.locked{opacity:.4;cursor:not-allowed;}
.step-num{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;border:1px solid rgba(255,255,255,0.35);margin-top:1px;
}
.step-item.done .step-num{background:var(--green);border-color:var(--green);color:#fff;}
.step-item.active .step-num{background:var(--accent);border-color:var(--accent);color:#221605;}
.step-label{font-size:13px;color:#EFEFE9;}
.step-item.active .step-label{font-weight:600;}
.step-sub{font-size:11px;color:#9CACA4;margin-top:1px;}
.sidebar-foot{padding:16px 24px 0;margin-top:16px;border-top:1px solid rgba(255,255,255,0.12);}
.progress-track{height:6px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;}
.sidebar-btns{display:flex;gap:8px;margin-top:12px;}
.sbtn{
  flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#EFEFE9;
  border-radius:7px;padding:10px 6px;font-size:11.5px;cursor:pointer;min-height:44px;
}
.sbtn:hover{background:rgba(255,255,255,0.16);}
.sbtn:active{background:rgba(255,255,255,0.22);}

/* ---- APP SHELL ---- */
#app{display:flex;min-height:100vh;padding-top:var(--mobile-strip-h);}
.main{flex:1;min-width:0;padding:16px 16px 80px;max-width:100%;}

/* ---- STEP HEADER ---- */
.step-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line);}
.step-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.step-header h2{font-size:clamp(20px,4vw,26px);}
.step-desc{color:var(--ink-soft);font-size:clamp(13px,2.5vw,14px);max-width:66ch;}

/* ---- CARDS / PANELS ---- */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h3{font-size:15px;text-transform:none;display:flex;align-items:center;gap:8px;}
.card-sub{color:var(--ink-soft);font-size:12.5px;margin:-4px 0 14px;}

/* ---- GRID (mobile: single column) ---- */
.grid{display:grid;gap:14px;grid-template-columns:1fr;}

/* ---- FORMS ---- */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:13px;font-weight:500;color:var(--ink-soft);}
.field .hint{font-size:11px;color:#8B948E;}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],select,textarea{
  font-family:var(--body);font-size:16px;padding:12px 14px;
  border:1px solid var(--line);border-radius:7px;
  background:#FCFBF8;color:var(--ink);width:100%;
  min-height:48px;transition:border-color .15s,background .15s;
}
input.mono-input{font-family:var(--mono);}
input:focus,select:focus,textarea:focus{border-color:var(--primary);background:#fff;}
input[data-edited="true"]{border-left:3px solid var(--accent);background:var(--accent-tint);}
label.checkbox{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;min-height:44px;padding:6px 0;}

/* ---- BUTTONS (touch-friendly) ---- */
.btn{
  display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;
  padding:12px 20px;border-radius:8px;border:1px solid transparent;
  cursor:pointer;font-family:var(--body);transition:all .15s;min-height:48px;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-secondary{background:var(--paper);color:var(--primary);border-color:var(--primary);}
.btn-secondary:hover{background:var(--primary-tint);}
.btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--line);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--paper);color:var(--red);border-color:var(--red);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{padding:8px 14px;font-size:13px;min-height:44px;}
.btn-block{width:100%;justify-content:center;}

/* ---- BUTTON :active states ---- */
.btn:active{transform:scale(0.97);opacity:0.9;}
.btn-primary:active{background:var(--primary-dark);}
.btn-secondary:active{background:var(--primary-tint);}
.btn-ghost:active{background:var(--bg);}

/* ---- FOOTER NAV ---- */
.footer-nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--line);}

/* ---- BADGES / STATUS ---- */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;font-family:var(--mono);}
.badge-green{background:var(--green-tint);color:var(--green);}
.badge-amber{background:var(--amber-tint);color:var(--amber);}
.badge-red{background:var(--red-tint);color:var(--red);}
.badge-neutral{background:var(--bg);color:var(--ink-soft);border:1px solid var(--line);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.dot-green{background:var(--green);} .dot-amber{background:var(--amber);} .dot-red{background:var(--red);}

/* ---- LEDGER ---- */
.ledger-num{font-family:var(--mono);cursor:pointer;border-bottom:1px dashed var(--accent);color:var(--ink);padding:4px 6px;border-radius:4px;position:relative;}
.ledger-num:hover{background:var(--accent-tint);}
.ledger-num:active{background:var(--accent);color:#fff;}
.ledger-num.edited::after{content:"¸E";font-size:9px;color:var(--accent);margin-left:3px;}

/* ---- TABLES ---- */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);}
td{padding:9px 10px;border-bottom:1px solid #EEEBE2;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
td.num,th.num{text-align:right;font-family:var(--mono);}

/* ---- HEALTH SCORE ---- */
.health-stamp{
  width:90px;height:90px;border-radius:50%;border:3px solid var(--green);display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-family:var(--mono);flex-shrink:0;background:var(--green-tint);
  transform:rotate(-3deg);
}
.health-stamp .score{font-size:26px;font-weight:600;line-height:1;}
.health-stamp .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.health-row{display:flex;flex-direction:column;gap:16px;align-items:center;}
.health-bars{width:100%;display:flex;flex-direction:column;gap:10px;}
.health-bar-item{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;font-size:12px;}
.health-bar-track{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--line);}
.health-bar-fill{height:100%;border-radius:99px;}

/* ---- REGIME COMPARISON ---- */
.regime-card{border:2px solid var(--line);border-radius:12px;padding:18px;position:relative;}
.regime-card.winner{border-color:var(--green);background:var(--green-tint);}
.regime-card .ribbon{position:absolute;top:-11px;right:16px;background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;}
.regime-total{font-family:var(--mono);font-size:28px;font-weight:600;margin:6px 0;}
.regime-line{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dotted var(--line);}

/* ---- DOC UPLOAD ---- */
.dropzone{
  border:2px dashed var(--line);border-radius:12px;padding:20px;text-align:center;cursor:pointer;
  background:#FCFBF8;transition:.15s;min-height:80px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
}
.dropzone:hover,.dropzone.dragover{border-color:var(--primary);background:var(--primary-tint);}
.dropzone:active{transform:scale(0.98);}
.doc-slot{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;background:var(--paper);}
.doc-slot .icon{width:34px;height:34px;border-radius:8px;background:var(--primary-tint);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.doc-slot .meta{flex:1;min-width:0;}
.doc-slot .name{font-weight:600;font-size:13px;}
.doc-slot .sub{font-size:11.5px;color:var(--ink-soft);}

/* ---- MISMATCH PANEL ---- */
.mismatch-card{border-left:4px solid var(--red);padding:12px 14px;background:var(--red-tint);border-radius:8px;margin-bottom:10px;}
.mismatch-card.amber{border-left-color:var(--amber);background:var(--amber-tint);}
.mismatch-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0;}
.mismatch-val{background:#fff;border-radius:6px;padding:8px 10px;border:1px solid var(--line);}
.mismatch-val .src{font-size:10.5px;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.03em;}
.mismatch-val .amt{font-family:var(--mono);font-size:15px;font-weight:600;}

/* ---- MODAL (bottom-sheet on mobile) ---- */
.overlay{position:fixed;inset:0;background:rgba(20,26,22,0.5);display:none;align-items:flex-end;justify-content:center;z-index:110;padding:0;}
.overlay.open{display:flex;}
.modal{
  background:var(--paper);border-radius:16px 16px 0 0;max-width:520px;width:100%;
  max-height:85vh;overflow-y:auto;padding:22px 24px;
  box-shadow:0 -4px 24px rgba(0,0,0,0.2);
  animation:slideUp .25s ease-out;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-soft);min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.trail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #EEEBE2;font-size:12.5px;}
.trail-row .k{color:var(--ink-soft);}
.trail-row .v{font-family:var(--mono);text-align:right;max-width:60%;}

/* ---- DETAILS / SUMMARY ---- */
summary{min-height:44px;display:flex;align-items:center;cursor:pointer;padding:8px 0;}

/* ---- TOAST ---- */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;
  z-index:200;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;
  max-width:calc(100vw - 32px);text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---- REPEAT ROW ---- */
.repeat-row{border:1px solid var(--line);border-radius:9px;padding:14px 14px 14px 14px;padding-right:56px;margin-bottom:10px;position:relative;background:#FCFBF8;}
.repeat-row .rm{position:absolute;top:8px;right:8px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}

/* ---- CALLOUT ---- */
.callout{background:var(--primary-tint);border-left:3px solid var(--primary);border-radius:6px;padding:10px 13px;font-size:12.5px;color:var(--primary-dark);}
.callout.warn{background:var(--amber-tint);border-left-color:var(--amber);color:#6B4F09;}

/* ---- SECTION TITLE ---- */
.section-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:"";flex:1;height:1px;background:var(--line);}

/* ---- WATERMARK ---- */
.watermark-disclaimer{font-size:11px;color:var(--ink-soft);border-top:1px solid var(--line);margin-top:30px;padding-top:14px;line-height:1.6;}

/* ---- MISC ---- */
.divider{height:1px;background:var(--line);margin:18px 0;}
.muted{color:var(--ink-soft);}
.small{font-size:12px;}
.flex{display:flex;align-items:center;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.gap-8{gap:8px;} .gap-12{gap:12px;} .gap-16{gap:16px;}
.mt-8{margin-top:8px;} .mt-16{margin-top:16px;} .mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;}
.pill{font-size:11.5px;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:10px 14px;cursor:pointer;display:inline-flex;align-items:center;min-height:44px;}
.pill:active{background:var(--primary-tint);}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ============================================
   LARGE MOBILE >= 576px
   ============================================ */
@media(min-width:576px){
  .main{padding:20px 24px 80px;}
  .card{padding:16px 18px;}
  .step-header h2{font-size:24px;}
}

/* ============================================
   TABLET >= 768px (sidebar permanent, desktop layout)
   ============================================ */
@media(min-width:768px){
  .mobile-strip,.drawer-overlay{display:none!important;}
  #app{padding-top:0;}
  .sidebar{
    position:sticky;top:0;height:100vh;
    transform:none !important;transition:none;width:260px;
  }
  .main{padding:28px 32px 80px;max-width:900px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:1fr 1fr 1fr;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .health-row{flex-direction:row;align-items:center;}
  .health-bar-item{grid-template-columns:150px 1fr 40px;}
  .modal{border-radius:12px;max-height:82vh;}
  .overlay{align-items:center;padding:20px;}
}

/* ============================================
   DESKTOP >= 1024px
   ============================================ */
@media(min-width:1024px){
  .sidebar{width:280px;}
  .main{padding:36px 44px 80px;max-width:1180px;}
  .card{padding:20px 22px;}
  .step-header h2{font-size:26px;}
  body{font-size:14px;}
  .btn{font-size:13.5px;padding:10px 18px;min-height:auto;}
  .btn-sm{padding:6px 11px;font-size:12px;min-height:auto;}
  input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],select,textarea{
    font-size:13.5px;padding:9px 10px;min-height:auto;
  }
  .grid{gap:14px;}
  .health-stamp{width:104px;height:104px;}
  .health-stamp .score{font-size:30px;}
  .repeat-row .rm{min-width:auto;min-height:auto;}
  .repeat-row{padding-right:14px;}
  .modal-close{min-width:auto;min-height:auto;}
}

</style>
</head>
<body>
<!-- Mobile: thin strip with hamburger -->
<div class="mobile-strip" id="mobileStrip">
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open navigation">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="mobile-strip-brand">
    <div class="brand-mark-sm">CA</div>
    <span>Personal CA</span>
  </div>
</div>
<!-- Drawer overlay (closes sidebar on tap) -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">CA</div>
      <h1>Personal CA</h1>
      <p>Tax Prep Workbench</p>
    </div>
    <ol class="step-list" id="stepList"></ol>
    <div class="sidebar-foot">
      <div class="flex-between" style="font-size:11px;color:#B9C7C0;">
        <span id="progressLabel">0% complete</span>
        <span id="fyLabel">FY —</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="sidebar-btns">
        <button class="sbtn" id="btnExport">Export Project</button>
        <button class="sbtn" id="btnImport">Import Project</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <div class="sidebar-btns">
        <button class="sbtn" id="btnNewProject" style="flex:1">New Project</button>
      </div>
    </div>
  </nav>
  <main class="main" id="main"></main>
</div>

<div class="overlay" id="trailOverlay">
  <div class="modal">
    <button class="modal-close" id="trailClose">✕</button>
    <div id="trailContent"></div>
  </div>
</div>

function loadState(){

  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  try{
    const raw = sessionStorage.getItem(LS_KEY);

  try{ sessionStorage.setItem(LS_KEY, JSON.stringify(STATE)); }catch(e){ console.warn("save failed", e); }
}

/* ---------------------- UTILS ---------------------- */
function uid(){ return Math.random().toString(36).slice(2,10); }
function INR(n){
  n = Number(n)||0;
  const neg = n<0; n = Math.abs(n);
  const parts = n.toFixed(0);
  let last3 = parts.slice(-3), rest = parts.slice(0,-3);
  if(rest!=="") last3 = ","+last3;
  rest = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ",");
  return (neg?"-":"") + "₹" + rest + last3;
}
function INR2(n){
  n = Number(n)||0;
  const neg = n<0; n=Math.abs(n);
  const [ip,fp] = n.toFixed(2).split(".");
  let rest = ip.slice(0,-3), last3 = ip.slice(-3);
  if(rest!=="") last3 = ","+last3;
  rest = rest.replace(/\B(?=(\d{2})+(?!\d))/g, ",");
  return (neg?"-":"") + "₹" + rest + last3 + "." + fp;
}
function clamp(n,lo,hi){ return Math.max(lo, Math.min(hi, n)); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove("show"), 2600);
}
function ageOnDate(dobStr, onDateStr){
  if(!dobStr) return null;
  const dob = new Date(dobStr), on = new Date(onDateStr);
  let age = on.getFullYear()-dob.getFullYear();
  const m = on.getMonth()-dob.getMonth();
  if(m<0 || (m===0 && on.getDate()<dob.getDate())) age--;
  return age;
}
function fyEndDate(ay){ // 31 March of FY end for given AY, e.g. AY2026-27 -> FY2025-26 -> end 2026-03-31
  const startYY = TAX_RULES[ay].fy.split("-")[0];
  const endYear = parseInt(startYY,10)+1;
  return endYear+"-03-31";
}
function slabTax(taxable, slabs){
  let tax=0;
  for(const [lo,hi,rate] of slabs){
    if(taxable>lo){ tax += (Math.min(taxable,hi)-lo)*rate; }
  }
  return tax;
}
/* Generic "amount just above threshold" marginal relief: caps incremental tax at incremental income */
function marginalRelief(income, threshold, taxAtIncome, taxAtThreshold){
  if(income<=threshold) return taxAtIncome;
  const extraIncome = income-threshold;
  const extraTax = taxAtIncome-taxAtThreshold;
  if(extraTax>extraIncome) return taxAtThreshold+extraIncome;
  return taxAtIncome;
}

function calcSalaryIncome(state, regime){
  const emps = state.income.salary.employers;
  let gross=0, exemptBoth=0, exemptOldOnly=0, profTax=0;
  emps.forEach(e=>{
    gross += Number(e.grossSalary)||0;
    exemptBoth += Number(e.exemptGeneral)||0;
    exemptOldOnly += Number(e.exemptOldRegimeOnly)||0;
    profTax += Number(e.professionalTax)||0;
  });
  const rules = TAX_RULES[state.meta.ay][regime];
  let hraExempt = 0;
  const h = state.deductions.hra;
  if(regime==="old" && h && h.claim){
    const basicDA = Number(h.basicDA)||0, rent = Number(h.rentPaid)||0, hraRecv=Number(h.hraReceived)||0;
    const byRule2 = Math.max(0, rent - 0.10*basicDA);
    const byRule3 = (h.cityMetro? 0.5:0.4) * basicDA;
    hraExempt = Math.max(0, Math.min(hraRecv, byRule2, byRule3));
  }
  let net = gross - exemptBoth - (regime==="old"? exemptOldOnly:0) - (regime==="old"? hraExempt:0) - (regime==="old"? profTax:0) - rules.standardDeduction;
  return { gross, exemptBoth, exemptOldOnly, hraExempt, profTax, standardDeduction:rules.standardDeduction, net:Math.max(0,net) };
}

function calcHouseProperty(state, regime){
  const props = state.income.houseProperty.properties;
  let selfOccInterestTotal=0, letOutNet=0, letOutLossTotal=0, netTotal=0;
  const detail = [];
  props.forEach(p=>{
    const ownPct = (Number(p.ownershipPct)||100)/100;
    if(p.type==="self"){
      const interest = (Number(p.homeLoanInterest)||0) + (Number(p.preConstructionInterest)||0)/5;
      if(regime==="old"){
        selfOccInterestTotal += interest*ownPct;
      }
      detail.push({...p, nav:0, deduction:0, netIncome:0, note: regime==="new"?"No interest deduction for self-occupied under New Regime":""});
    } else {
      const rentReceived = Number(p.rentReceived)||0;
      const municipalValue = Number(p.municipalValue)||0;
      const fairRent = Number(p.fairRent)||0;
      const standardRent = Number(p.standardRent)||Infinity;
      const grossAnnualValue = p.type==="deemed" ? Math.max(municipalValue,fairRent) : Math.max(rentReceived, Math.min(Math.max(municipalValue,fairRent), standardRent));
      const municipalTaxes = Number(p.municipalTaxesPaid)||0;
      const nav = Math.max(0, grossAnnualValue - municipalTaxes);
      const stdDeduction = nav*0.30;
      const interest = ((Number(p.homeLoanInterest)||0) + (Number(p.preConstructionInterest)||0)/5);
      const netIncome = (nav - stdDeduction - interest) * ownPct;
      letOutNet += netIncome;
      if(netIncome<0) letOutLossTotal += -netIncome;
      detail.push({...p, nav, deduction:stdDeduction+interest, netIncome});
    }
  });
  let selfOccDeduction = 0;
  if(regime==="old") selfOccDeduction = Math.min(selfOccInterestTotal, 200000);
  const selfOccNet = -selfOccDeduction;
  netTotal = selfOccNet + letOutNet;
  // set-off against other heads: old regime up to 2,00,000/year; new regime: 0 (no cross-head set-off)
  const capLimit = regime==="old" ? 200000 : 0;
  const lossAvailable = Math.max(0,-netTotal);
  const setOffThisYear = Math.min(lossAvailable, capLimit);
  const carryForwardLoss = lossAvailable - setOffThisYear;
  const incomeForGTI = netTotal<0 ? -setOffThisYear : netTotal;
  return { detail, selfOccDeduction, letOutNet, netTotal, incomeForGTI, carryForwardLoss };
}

function monthsBetween(d1,d2){
  const a=new Date(d1), b=new Date(d2);
  return (b-a)/(1000*60*60*24*30.44);
}
function cciFor(dateStr){
  const y = new Date(dateStr).getFullYear();
  const fyStartYear = (new Date(dateStr).getMonth()<3) ? y-1 : y; // FY starts April
  return CII[fyStartYear] || CII[2026];
}

function calcCapitalGains(state, ay){
  const rules = TAX_RULES[ay].capGains;
  const txns = state.income.capitalGains.transactions;
  let ST_slab=0, ST_eq20=0, LT_eq125=0, LT_flat125=0, LT_indexed20=0;
  const detail = [];
  txns.forEach(t=>{
    const sale = Number(t.saleValue)||0;
    const cost = Number(t.costOfAcquisition)||0;
    const improvement = Number(t.costOfImprovement)||0;
    const expenses = Number(t.expenses)||0;
    const exemption = Number(t.exemptionClaimed)||0;
    const months = monthsBetween(t.acquireDate, t.saleDate);
    let bucket, gain, rateUsed, note="";
    if(t.assetClass==="equity" || t.assetClass==="equityMF"){
      const isLT = months>12;
      let effCost = cost;
      if(t.acquireDate && new Date(t.acquireDate) < new Date(rules.grandfatherDate) && t.fmv31Jan2018){
        const fmv = Number(t.fmv31Jan2018);
        effCost = Math.max(cost, Math.min(fmv, sale));
        note = "Grandfathered cost applied (31-Jan-2018 FMV)";
      }
      gain = sale - effCost - expenses;
      if(isLT){ bucket="LT_eq125"; rateUsed="12.5% (Sec 112A, after ₹1.25L exemption)"; }
      else { bucket="ST_eq20"; rateUsed="20% (Sec 111A)"; }
    } else if(t.assetClass==="debtMF"){
      if(t.acquireDate && new Date(t.acquireDate) >= new Date("2023-04-01")){
        gain = sale - cost - improvement - expenses;
        bucket="ST_slab"; rateUsed="Slab rate (Sec 50AA — units acquired on/after 1-Apr-2023)";
      } else {
        const isLT = months>24;
        gain = sale - cost - improvement - expenses;
        if(isLT){ bucket="LT_flat125"; rateUsed="12.5% (no indexation)"; } else { bucket="ST_slab"; rateUsed="Slab rate"; }
      }
    } else if(t.assetClass==="property"){
      const isLT = months>24;
      if(!isLT){ gain = sale-cost-improvement-expenses-exemption; bucket="ST_slab"; rateUsed="Slab rate"; }
      else {
        const preCutoff = t.acquireDate && new Date(t.acquireDate) < new Date(rules.newRateCutoff);
        const gainFlat = sale-cost-improvement-expenses-exemption;
        const taxFlat = Math.max(0,gainFlat)*rules.otherLTCGRate;
        if(preCutoff){
          const idxCost = cost*(cciFor(t.saleValue&&t.saleDate?t.saleDate:new Date())/cciFor(t.acquireDate));
          const idxImprov = improvement*(cciFor(t.saleDate)/cciFor(t.acquireDate));
          const gainIdx = sale-idxCost-idxImprov-expenses-exemption;
          const taxIdx = Math.max(0,gainIdx)*rules.otherLTCGRateIndexed;
          if(taxIdx<taxFlat){ gain=gainIdx; bucket="LT_indexed20"; rateUsed="20% (with indexation — auto-selected as lower tax)"; }
          else { gain=gainFlat; bucket="LT_flat125"; rateUsed="12.5% (no indexation — auto-selected as lower tax)"; }
        } else { gain=gainFlat; bucket="LT_flat125"; rateUsed="12.5% (no indexation — acquired on/after 23-Jul-2024)"; }
      }
    } else { // gold / other
      const isLT = months>24;
      gain = sale-cost-improvement-expenses;
      if(isLT){ bucket="LT_flat125"; rateUsed="12.5% (no indexation)"; } else { bucket="ST_slab"; rateUsed="Slab rate"; }
    }
    if(bucket==="ST_slab") ST_slab+=gain;
    else if(bucket==="ST_eq20") ST_eq20+=gain;
    else if(bucket==="LT_eq125") LT_eq125+=gain;
    else if(bucket==="LT_flat125") LT_flat125+=gain;
    else if(bucket==="LT_indexed20") LT_indexed20+=gain;
    detail.push({...t, gain, bucket, rateUsed, note, holdingMonths:Math.round(months)});
  });

  let gST_slab=Math.max(0,ST_slab), gST_eq20=Math.max(0,ST_eq20), gLT_eq125=Math.max(0,LT_eq125), gLT_flat125=Math.max(0,LT_flat125), gLT_indexed20=Math.max(0,LT_indexed20);
  const lossST_current = Math.max(0,-ST_slab)+Math.max(0,-ST_eq20);
  const lossLT_current = Math.max(0,-LT_eq125)+Math.max(0,-LT_flat125)+Math.max(0,-LT_indexed20);
  const cf = state.carryForward;
  let totalSTCL = (Number(cf.pySTCL_equity)||0)+(Number(cf.pySTCL_other)||0)+lossST_current;
  let totalLTCL = (Number(cf.pyLTCL_equity)||0)+(Number(cf.pyLTCL_other)||0)+lossLT_current;

  function useAgainst(order){
    for(const key of order){
      const map={ST_slab:()=>gST_slab, ST_eq20:()=>gST_eq20, LT_eq125:()=>gLT_eq125, LT_flat125:()=>gLT_flat125, LT_indexed20:()=>gLT_indexed20};
      let val = map[key]();
      if(val<=0) continue;
      const use = Math.min(totalSTCL, val);
      val -= use; totalSTCL -= use;
      if(key==="ST_slab") gST_slab=val; else if(key==="ST_eq20") gST_eq20=val; else if(key==="LT_eq125") gLT_eq125=val; else if(key==="LT_flat125") gLT_flat125=val; else if(key==="LT_indexed20") gLT_indexed20=val;
    }
  }
  useAgainst(["ST_slab","LT_indexed20","ST_eq20","LT_flat125","LT_eq125"]);
  function useAgainstLT(order){
    for(const key of order){
      const map={LT_eq125:()=>gLT_eq125, LT_flat125:()=>gLT_flat125, LT_indexed20:()=>gLT_indexed20};
      let val = map[key]();
      if(val<=0) continue;
      const use = Math.min(totalLTCL, val);
      val -= use; totalLTCL -= use;
      if(key==="LT_eq125") gLT_eq125=val; else if(key==="LT_flat125") gLT_flat125=val; else if(key==="LT_indexed20") gLT_indexed20=val;
    }
  }
  useAgainstLT(["LT_indexed20","LT_flat125","LT_eq125"]);

  const taxableLTeq = Math.max(0, gLT_eq125 - rules.equityLTCGExemption);
  const taxSTeq20 = gST_eq20*rules.equitySTCGRate;
  const taxLTeq125 = taxableLTeq*rules.equityLTCGRate;
  const taxLTflat125 = gLT_flat125*rules.otherLTCGRate;
  const taxLTindexed20 = gLT_indexed20*rules.otherLTCGRateIndexed;
  const specialRateTax = taxSTeq20+taxLTeq125+taxLTflat125+taxLTindexed20;
  const specialRateIncome = gST_eq20+taxableLTeq+gLT_flat125+gLT_indexed20;
  const equitySurchargeBaseIncome = gST_eq20+taxableLTeq; // for surcharge-cap purposes

  return {
    detail, ST_slab_addToGTI:gST_slab, specialRateTax, specialRateIncome, equitySurchargeBaseIncome,
    remainingSTCL_carryFwd: totalSTCL, remainingLTCL_carryFwd: totalLTCL,
    breakdown:{ gST_slab, gST_eq20, gLT_eq125, taxableLTeq, gLT_flat125, gLT_indexed20, taxSTeq20, taxLTeq125, taxLTflat125, taxLTindexed20 }
  };
}

function calcOtherSources(state, regime, ay){
  const items = state.income.otherSources.items;
  let savingsInt=0, fdrdInt=0, dividend=0, familyPension=0, gifts=0, lottery=0, other=0;
  items.forEach(it=>{
    const amt = Number(it.amount)||0;
    if(it.kind==="savings") savingsInt+=amt;
    else if(it.kind==="fd" || it.kind==="rd") fdrdInt+=amt;
    else if(it.kind==="dividend") dividend+=amt;
    else if(it.kind==="familyPension") familyPension+=amt;
    else if(it.kind==="gift") gifts+=amt;
    else if(it.kind==="lottery") lottery+=amt;
    else other+=amt;
  });
  const rules = TAX_RULES[ay][regime];
  const fpDeduction = Math.min(familyPension/3, rules.familyPensionDeduction);
  const familyPensionNet = Math.max(0, familyPension - fpDeduction);
  // 80TTA/TTB handled in deductions step (needs age); here just report interest gross
  const normalOtherIncome = savingsInt + fdrdInt + dividend + familyPensionNet + gifts + other; // lottery excluded (flat 30% special rate)
  return { savingsInt, fdrdInt, dividend, familyPension, fpDeduction, familyPensionNet, gifts, lottery, other, normalOtherIncome, lotteryTax: lottery*0.30 };
}

function calcDeductions(state, regime, otherSourcesCalc){
  const d = state.deductions;
  if(regime==="new"){
    // Only 80CCD(2) employer NPS contribution allowed in new regime
    const cap = (state.personal.employerCategory==="govt"?0.14:0.10) * (Number(d.hra?.basicDA)||0);
    const s80ccd2 = Math.min(Number(d.s80CCD2)||0, cap>0?cap:(Number(d.s80CCD2)||0));
    return { total: s80ccd2, s80CCD2:s80ccd2, breakdown:[{label:"80CCD(2) — Employer NPS contribution", amount:s80ccd2}] };
  }
  const breakdown = [];
  let total = 0;
  function add(label, amount){ amount=Math.max(0,amount||0); if(amount>0) breakdown.push({label,amount}); total+=amount; }
  add("80C", Math.min(Number(d.s80C)||0, 150000));
  add("80CCD(1B) — additional NPS", Math.min(Number(d.s80CCD1B)||0, 50000));
  const cap = (state.personal.employerCategory==="govt"?0.14:0.10) * (Number(d.hra?.basicDA)||0);
  add("80CCD(2) — Employer NPS contribution", Math.min(Number(d.s80CCD2)||0, cap>0?cap:(Number(d.s80CCD2)||0)));
  const selfCap = d.s80D_selfSenior?50000:25000;
  const parentsCap = d.s80D_parentsSenior?50000:25000;
  add("80D — Self/Family health insurance", Math.min((Number(d.s80D_self)||0)+(Number(d.s80D_preventive)||0), selfCap));
  add("80D — Parents' health insurance", Math.min(Number(d.s80D_parents)||0, parentsCap));
  if(d.s80DD_claim) add("80DD — Disabled dependent", d.s80DD_severity==="severe"?125000:75000);
  if((Number(d.s80DDB_amount)||0)>0) add("80DDB — Specified disease treatment", Math.min(Number(d.s80DDB_amount)||0, d.s80DDB_seniorPatient?100000:40000));
  add("80E — Education loan interest", Number(d.s80E)||0);
  add("80EE — Additional home loan interest", Math.min(Number(d.s80EE)||0, 50000));
  add("80EEA — Affordable housing loan interest", Math.min(Number(d.s80EEA)||0, 150000));
  add("80GGA — Donations (scientific research/rural dev.)", Number(d.s80GGA)||0);
  if(d.s80U_severity!=="none") add("80U — Self disability", d.s80U_severity==="severe"?125000:75000);
  let g80total=0;
  (d.s80G||[]).forEach(g=>{ g80total += (Number(g.amount)||0) * ((Number(g.eligiblePct)||50)/100); });
  add("80G — Donations", g80total);
  // 80TTA / 80TTB — age-based, old regime only
  const age = ageOnDate(state.personal.dob, fyEndDate(state.meta.ay));
  const isSenior = age!=null && age>=60;
  let ttaTtb = 0;
  if(isSenior){ ttaTtb = Math.min((otherSourcesCalc.savingsInt+otherSourcesCalc.fdrdInt), 50000); add("80TTB — Interest income (senior citizen)", ttaTtb); }
  else { ttaTtb = Math.min(otherSourcesCalc.savingsInt, 10000); add("80TTA — Savings account interest", ttaTtb); }
  return { total, breakdown, ttaTtb, isSenior };
}

/* Full tax computation for one regime */
function computeRegime(state, regime){
  const ay = state.meta.ay;
  const rules = TAX_RULES[ay][regime];
  const capGainsCalc = calcCapitalGains(state, ay);
  const salaryCalc = calcSalaryIncome(state, regime);
  const hpCalc = calcHouseProperty(state, regime);
  const osCalc = calcOtherSources(state, regime, ay);
  const dedCalc = calcDeductions(state, regime, osCalc);

  const agri = Number(state.income.agriculturalIncome)||0;

  const normalIncome = salaryCalc.net + hpCalc.incomeForGTI + osCalc.normalOtherIncome + capGainsCalc.ST_slab_addToGTI;
  const gti = normalIncome; // gross total income before Chapter VI-A (special-rate incomes excluded)
  const taxableNormal = Math.max(0, gti - dedCalc.total);

  const age = ageOnDate(state.personal.dob, fyEndDate(ay));
  // build age-adjusted old-regime slabs cleanly
  function oldSlabsForAge(){
    const exempt = (age!=null && age>=80) ? rules.superSeniorExemption : (age!=null && age>=60) ? rules.seniorExemption : 250000;
    return [[0,exempt,0],[exempt,500000,0.05],[500000,1000000,0.20],[1000000,Infinity,0.30]];
  }
  const activeSlabs = regime==="old" ? oldSlabsForAge() : rules.slabs;

  // Agricultural income partial integration (old & new regime both apply this method per law, only if net agri >5000 and non-agri income exceeds basic exemption)
  const basicExemption = activeSlabs[0][1];
  let agriTaxAdd = 0;
  if(agri>5000 && taxableNormal>basicExemption){
    const taxWithAgri = slabTax(taxableNormal+agri, activeSlabs);
    const taxOnAgriPlusBasic = slabTax(agri+basicExemption, activeSlabs);
    agriTaxAdd = Math.max(0, taxWithAgri - taxOnAgriPlusBasic) - slabTax(taxableNormal, activeSlabs);
  }
  const taxOnNormal = slabTax(taxableNormal, activeSlabs) + Math.max(0,agriTaxAdd);

  // capital gains special-rate tax (not eligible for slab/agri treatment)
  const specialTax = capGainsCalc.specialRateTax + osCalc.lotteryTax;

  const totalIncomeForRebate = taxableNormal; // rebate 87A only considers normal-slab income for its threshold typically total taxable income incl special rate for threshold check but rebate itself only reduces tax on normal income + certain capital gains(112A) as clarified by CBDT for new regime up to specified extent. We take conservative approach: apply rebate only against normal-rate tax.
  let rebate = 0;
  const totalTaxableForThreshold = taxableNormal + capGainsCalc.specialRateIncome + osCalc.lottery;
  if(totalTaxableForThreshold <= rules.rebate87A.limit){
    rebate = Math.min(taxOnNormal, rules.rebate87A.max);
  } else if(regime==="new"){
    // marginal relief near the 12L (or 7L) threshold for new regime, normal-rate tax only
    const thresh = rules.rebate87A.limit;
    if(totalTaxableForThreshold > thresh && totalTaxableForThreshold < thresh + rules.rebate87A.max*4){
      const taxAtThresh = 0;
      const extraIncome = totalTaxableForThreshold - thresh;
      const wouldBeTax = taxOnNormal;
      if(wouldBeTax > extraIncome){ rebate = Math.max(0, wouldBeTax - extraIncome); }
    }
  }
  const taxAfterRebateNormal = Math.max(0, taxOnNormal - rebate);
  const taxBeforeSurcharge = taxAfterRebateNormal + specialTax;

  const totalIncomeForSurcharge = taxableNormal + capGainsCalc.specialRateIncome + osCalc.lottery;
  let surchargeRate = 0;
  for(const [lo,hi,rate] of rules.surcharge){ if(totalIncomeForSurcharge>lo) surchargeRate = rate; }
  // cap surcharge on equity-related capital gains at 15%
  const equityIncome = capGainsCalc.equitySurchargeBaseIncome;
  const nonEquitySpecialIncome = capGainsCalc.specialRateIncome - equityIncome;
  const equityTaxPortion = capGainsCalc.breakdown.taxSTeq20 + capGainsCalc.breakdown.taxLTeq125;
  const otherSpecialTaxPortion = specialTax - equityTaxPortion;
  const surchargeOnNormalPlusOtherSpecial = (taxAfterRebateNormal + otherSpecialTaxPortion) * surchargeRate;
  const surchargeOnEquity = equityTaxPortion * Math.min(surchargeRate, TAX_RULES[ay].capGains.surchargeCapEquity);
  let surcharge = surchargeOnNormalPlusOtherSpecial + surchargeOnEquity;
  let marginalReliefApplied = false;

  // Marginal relief: total tax+surcharge at income must not exceed [tax at threshold] + [income beyond threshold].
  // Approximated using normal slab tax at the threshold income (most accurate for salaried taxpayers with
  // little/no special-rate income; for large capital-gains cases near a surcharge threshold, verify with a CA).
  if(surchargeRate>0){
    let thresholdLo = 0;
    for(const [lo,hi,rate] of rules.surcharge){ if(rate===surchargeRate){ thresholdLo = lo; break; } }
    const taxAtThreshold = slabTax(thresholdLo, activeSlabs);
    const incomeExcess = totalIncomeForSurcharge - thresholdLo;
    const actualTotal = taxBeforeSurcharge + surcharge;
    const maxAllowed = taxAtThreshold + incomeExcess;
    if(actualTotal > maxAllowed){
      surcharge = Math.max(0, maxAllowed - taxBeforeSurcharge);
      marginalReliefApplied = true;
    }
  }

  const taxWithSurcharge = taxBeforeSurcharge + surcharge;
  const cess = taxWithSurcharge * TAX_RULES[ay].cess;
  const totalTaxLiability = taxWithSurcharge + cess;

  return {
    regime, salaryCalc, hpCalc, capGainsCalc, osCalc, dedCalc,
    gti, taxableNormal, taxOnNormal, agriTaxAdd, rebate, taxAfterRebateNormal,
    specialTax, taxBeforeSurcharge, surchargeRate, surcharge, cess, totalTaxLiability, marginalReliefApplied,
    totalIncomeAll: taxableNormal + capGainsCalc.specialRateIncome + osCalc.lottery + dedCalc.total /* for AL/500L thresholds we use gross total */
  };
}

function calcPaymentsAndInterest(state, regimeResult, intendedFilingDateStr){
  const tp = state.taxPayments;
  const sum = arr => (arr||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
  const tds = sum(tp.tds), tcs = sum(tp.tcs), advTotal = sum(tp.advanceTax), saTotal = sum(tp.selfAssessmentTax);
  const totalTax = regimeResult.totalTaxLiability;
  const balanceBeforeInterest = totalTax - tds - tcs - advTotal - saTotal;
  const totalPaid = tds + tcs + advTotal + saTotal;
  const dueDate = new Date(TAX_RULES[state.meta.ay].e_filing_due_date);
  const filingDate = intendedFilingDateStr ? new Date(intendedFilingDateStr) : dueDate;
  const filingBeforeDue = !intendedFilingDateStr || filingDate <= dueDate;

  let int234A = 0, int234B = 0, int234C = 0;

  if(filingBeforeDue){
    /* Filing before due date — no interest under 234A/B/C (matches ITR portal behavior) */
  } else {
    // 234B: if advance tax + TDS/TCS paid < 90% of assessed tax -> 1%/month from 1-Apr of AY to filing/assessment
    const assessedTax = totalTax - tds - tcs;
    const advPaid = advTotal;
    if(advPaid < 0.9*assessedTax){
      const shortfall = assessedTax - advPaid;
      const ayStart = new Date(TAX_RULES[state.meta.ay].fy.split("-")[1].length===2 ? ("20"+TAX_RULES[state.meta.ay].fy.split("-")[1])+"-04-01" : fyEndDate(state.meta.ay));
      const monthsLate = Math.max(0, Math.ceil((filingDate - new Date(fyEndDate(state.meta.ay)))/(1000*60*60*24*30.44)));
      int234B = shortfall * 0.01 * monthsLate;
    }
    // 234C: simplified quarterly shortfall check vs 15/45/75/100% cumulative advance tax due by 15Jun/15Sep/15Dec/15Mar
    const q = tp.advanceTax||[];
    const byQuarter = {Q1:0,Q2:0,Q3:0,Q4:0};
    q.forEach(x=>{ if(byQuarter[x.quarter]!==undefined) byQuarter[x.quarter]+=Number(x.amount)||0; });
    const cum = {Q1:byQuarter.Q1, Q2:byQuarter.Q1+byQuarter.Q2, Q3:byQuarter.Q1+byQuarter.Q2+byQuarter.Q3, Q4:byQuarter.Q1+byQuarter.Q2+byQuarter.Q3+byQuarter.Q4};
    const req = {Q1:0.15*assessedTax, Q2:0.45*assessedTax, Q3:0.75*assessedTax, Q4:1.0*assessedTax};
    const months = {Q1:3,Q2:3,Q3:3,Q4:1};
    ["Q1","Q2","Q3","Q4"].forEach(k=>{
      if(cum[k] < req[k]*0.999){
        int234C += (req[k]-cum[k]) * 0.01 * months[k];
      }
    });
    // 234A: late filing interest, 1%/month on unpaid tax from due date to filing date
    if(filingDate > dueDate){
      const unpaid = Math.max(0, totalTax - tds - tcs - advTotal - saTotal);
      const monthsLate = Math.ceil((filingDate-dueDate)/(1000*60*60*24*30.44));
      int234A = unpaid * 0.01 * monthsLate;
    }
  }
  const totalInterest = int234A+int234B+int234C;
  const balancePayable = balanceBeforeInterest + totalInterest;
  return { tds, tcs, advTotal, saTotal, int234A, int234B, int234C, totalInterest, balanceBeforeInterest, balancePayable, isRefund: balancePayable<0 };
}

/* =====================================================================
   DOCUMENT HEALTH SCORE + RECONCILIATION
   ===================================================================== */
function computeHealthScore(state){
  const docs = state.documents;
  const have = k => docs.some(d=>d.type===k);
  const checks = [];
  let requiredScore=0, requiredMax=0;

  const coreReq = ["form16","ais","tis","form26as"];
  coreReq.forEach(k=>{
    const dt = DOC_TYPES.find(d=>d.key===k);
    requiredMax += 10;
    if(have(k)){ requiredScore+=10; checks.push({level:"ok", text:`${dt.label} uploaded`}); }
    else { checks.push({level:"warn", text:`${dt.label} missing`, impact:"Core reconciliation for this document is unavailable."}); }
  });

  // conditional recommendations based on entered income vs uploaded docs
  const hasCG = state.income.capitalGains.transactions.length>0;
  const hasHomeLoan = state.income.houseProperty.properties.some(p=>(Number(p.homeLoanInterest)||0)>0);
  const hasDonation = (state.deductions.s80G||[]).length>0;
  const hasInterestIncome = state.income.otherSources.items.some(i=>["savings","fd","rd"].includes(i.kind));
  const hasDividend = state.income.otherSources.items.some(i=>i.kind==="dividend");

  requiredMax+=5; if(!hasCG || have("broker")){ requiredScore+=5; if(hasCG) checks.push({level:"ok", text:"Broker/Capital Gains statement uploaded"}); }
  else checks.push({level:"warn", text:"Capital gains entered but no Broker statement uploaded", impact:"Transactions cannot be cross-verified against AIS."});

  requiredMax+=5; if(!hasHomeLoan || have("homeloan")){ requiredScore+=5; if(hasHomeLoan) checks.push({level:"ok", text:"Home Loan Interest Certificate uploaded"}); }
  else checks.push({level:"warn", text:"Home loan interest claimed but certificate missing", impact:"24(b) deduction cannot be validated."});

  requiredMax+=5; if(!hasDonation || have("donation")){ requiredScore+=5; if(hasDonation) checks.push({level:"ok", text:"Donation receipts uploaded"}); }
  else checks.push({level:"warn", text:"80G donation claimed but receipt missing", impact:"80G deduction cannot be validated."});

  requiredMax+=5; if(!hasInterestIncome || have("interest")){ requiredScore+=5; if(hasInterestIncome) checks.push({level:"ok", text:"Interest certificate uploaded"}); }
  else checks.push({level:"warn", text:"Bank/FD/RD interest entered but certificate missing", impact:"Interest income cannot be cross-verified."});

  requiredMax+=5; if(!hasDividend || have("dividend")){ requiredScore+=5; if(hasDividend) checks.push({level:"ok", text:"Dividend statement uploaded"}); }
  else checks.push({level:"warn", text:"Dividend income entered but statement missing", impact:"Dividend income cannot be cross-verified."});

  // parse success
  let parseScore=0, parseMax=0;
  docs.forEach(d=>{ parseMax+=10; if(d.parseStatus==="success") parseScore+=10; else if(d.parseStatus==="partial") parseScore+=5; else checks.push({level:"error", text:`${d.name} failed to parse`, impact:"Use manual entry to supply this document's values."}); });
  if(parseMax===0) parseMax=10;

  // reconciliation / mismatch score
  const recon = buildReconciliation(state);
  let reconScore=0, reconMax = recon.items.length*10 || 10;
  recon.items.forEach(it=>{
    const resolved = state.reconciliation.resolutions[it.id];
    if(it.status==="green") reconScore+=10;
    else if(resolved) reconScore+=8;
    else if(it.status==="amber") reconScore+=4;
    else checks.push({level:"error", text:`Mismatch: ${it.label}`, impact:it.impact||"Unresolved mismatch may cause an incorrect return."});
  });
  if(recon.items.length===0) reconScore=reconMax;

  const weighted = (requiredScore/Math.max(1,requiredMax))*35 + (parseScore/Math.max(1,parseMax))*25 + (reconScore/Math.max(1,reconMax))*40;
  const score = Math.round(weighted);
  let band, bandColor;
  if(score<50){ band="Critical Issues"; bandColor="red"; }
  else if(score<80){ band="Needs Attention"; bandColor="amber"; }
  else if(score<95){ band="Mostly Ready"; bandColor="green"; }
  else { band="Ready for Filing"; bandColor="green"; }

  return { score, band, bandColor, checks, sub:{
    required:{score:requiredScore,max:requiredMax}, parse:{score:parseScore,max:parseMax}, recon:{score:reconScore,max:reconMax}
  }, reconItems:recon.items };
}

function buildReconciliation(state){
  const items = [];
  const docVal = (type, field) => {
    const d = state.documents.find(x=>x.type===type);
    if(!d) return null;
    const f = (d.extractedFields||[]).find(x=>x.label===field);
    return f ? Number(f.value)||0 : null;
  };
  // Salary: Form16 vs AIS
  const salaryEntered = state.income.salary.employers.reduce((s,e)=>s+(Number(e.grossSalary)||0),0);
  const aisSalary = docVal("ais","Salary");
  if(salaryEntered>0 && aisSalary!=null){
    const diff = Math.abs(salaryEntered-aisSalary);
    items.push({id:"sal_ais", label:"Salary: entered vs AIS", a:{src:"Entered / Form 16", val:salaryEntered}, b:{src:"AIS", val:aisSalary},
      status: diff<1000?"green":diff<0.02*salaryEntered?"amber":"red", diff, impact:"May affect total income and tax computed."});
  }
  // TDS: Form16 vs 26AS
  const tdsEntered = (state.taxPayments.tds||[]).reduce((s,t)=>s+(Number(t.amount)||0),0);
  const tds26AS = docVal("form26as","TDS");
  if(tdsEntered>0 && tds26AS!=null){
    const diff = Math.abs(tdsEntered-tds26AS);
    items.push({id:"tds_26as", label:"TDS: entered vs Form 26AS", a:{src:"Entered", val:tdsEntered}, b:{src:"Form 26AS", val:tds26AS},
      status: diff<100?"green":diff<0.02*tdsEntered?"amber":"red", diff, impact:"Affects refund/balance payable calculation directly."});
  }
  // Interest: entered vs AIS
  const interestEntered = state.income.otherSources.items.filter(i=>["savings","fd","rd"].includes(i.kind)).reduce((s,i)=>s+(Number(i.amount)||0),0);
  const aisInterest = docVal("ais","Interest");
  if(interestEntered>0 && aisInterest!=null){
    const diff = Math.abs(interestEntered-aisInterest);
    items.push({id:"int_ais", label:"Interest income: entered vs AIS", a:{src:"Entered", val:interestEntered}, b:{src:"AIS", val:aisInterest},
      status: diff<500?"green":diff<0.05*interestEntered?"amber":"red", diff, impact:"AIS may include accounts you haven't added yet."});
  }
  // Dividend: entered vs AIS
  const divEntered = state.income.otherSources.items.filter(i=>i.kind==="dividend").reduce((s,i)=>s+(Number(i.amount)||0),0);
  const aisDiv = docVal("ais","Dividend");
  if(divEntered>0 && aisDiv!=null){
    const diff = Math.abs(divEntered-aisDiv);
    items.push({id:"div_ais", label:"Dividend income: entered vs AIS", a:{src:"Entered", val:divEntered}, b:{src:"AIS", val:aisDiv},
      status: diff<500?"green":diff<0.05*divEntered?"amber":"red", diff, impact:"Check if any companies are missing from your entries."});
  }
  // Advance/Self-assessment tax vs 26AS challans
  const challansEntered = (state.taxPayments.advanceTax||[]).concat(state.taxPayments.selfAssessmentTax||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const challans26AS = docVal("form26as","Advance/Self-Assessment Tax");
  if(challansEntered>0 && challans26AS!=null){
    const diff = Math.abs(challansEntered-challans26AS);
    items.push({id:"challan_26as", label:"Advance/Self-Assessment Tax: entered vs Form 26AS", a:{src:"Entered", val:challansEntered}, b:{src:"Form 26AS", val:challans26AS},
      status: diff<100?"green":"red", diff, impact:"Unallocated challans may mean a payment isn't being credited."});
  }
  return { items };
}

/* =====================================================================
   ITR RECOMMENDATION ENGINE
   ===================================================================== */
function recommendITR(state){
  const reasons_for = [], reasons_against_1 = [];
  const hasCG = state.income.capitalGains.transactions.length>0;
  const props = state.income.houseProperty.properties;
  const multipleHP = props.length>1;
  const agri = Number(state.income.agriculturalIncome)||0;
  const totalIncomeApprox = (function(){
    try{
      const r = computeRegime(state, state.regimeSelected||"new");
      return r.totalIncomeAll;
    }catch(e){ return 0; }
  })();
  const foreignFlag = state.personal.residentialStatus !== "resident";

  let form = "ITR-1";
  if(hasCG){ form="ITR-2"; reasons_for.push("You have Capital Gains income — not supported by ITR-1."); }
  if(multipleHP){ form="ITR-2"; reasons_for.push("You have more than one house property — ITR-1 allows only one."); }
  if(agri>5000){ form="ITR-2"; reasons_for.push("Agricultural income exceeds ₹5,000 — ITR-1 does not support this."); }
  if(totalIncomeApprox>5000000){ form="ITR-2"; reasons_for.push("Total income exceeds ₹50 lakh — ITR-1 is not applicable above this limit."); }
  if(foreignFlag){ reasons_for.push("Residential status is not 'Resident' — please review carefully; non-resident treatment is only partially supported in v1."); }

  if(form==="ITR-1"){
    reasons_against_1.push("No capital gains, single house property, income within ₹50L, agricultural income ≤ ₹5,000 — ITR-1 (Sahaj) fits.");
  } else {
    reasons_against_1.push("ITR-1 rejected because: " + reasons_for.join(" "));
  }
  return { form, reasons_for, reasons_against_1, scheduleAL: totalIncomeApprox>5000000 };
}

/* =====================================================================
   DOCUMENT PARSERS
   ===================================================================== */
function parseCSVText(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(lines.length===0) return {headers:[], rows:[]};
  const splitLine = l => l.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
  const headers = splitLine(lines[0]);
  const rows = lines.slice(1).map(l=>{
    const cells = splitLine(l);
    const obj = {};
    headers.forEach((h,i)=> obj[h]=cells[i]!==undefined?cells[i]:"");
    return obj;
  });
  return {headers, rows};
}

// Heuristic label->amount extraction for text-based PDFs (Form16/AIS/26AS/etc.)
const PDF_LABEL_PATTERNS = [
  {label:"Salary", re:/(gross salary|salary (?:as per|u\/s ?17\(1\))|income under.{0,5}head.{0,5}salar\w*)[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i},
  {label:"TDS", re:/(total tax deducted|tds deducted|tax deducted at source)[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i},
  {label:"Interest", re:/(interest income|savings (?:bank )?interest|interest paid\/credited)[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i},
  {label:"Dividend", re:/(dividend income|dividend received)[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i},
  {label:"Advance/Self-Assessment Tax", re:/(advance tax|self.assessment tax)[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i},
  {label:"PAN", re:/PAN[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i},
  {label:"Employer/TAN", re:/TAN[:\s]*([A-Z]{4}[0-9]{5}[A-Z])/i}
];
function extractGenericFields(text){
  const n = text.replace(/\s+/g," ");
  const fields = [];
  PDF_LABEL_PATTERNS.forEach(p=>{
    const m = n.match(p.re);
    if(m){
      const raw = m[2]!==undefined ? m[2] : m[1];
      const cleaned = raw.replace(/,/g,"");
      fields.push({label:p.label, value: isNaN(parseFloat(cleaned)) ? cleaned : parseFloat(cleaned), confidence: "medium", used:false});
    }
  });
  return fields;
}

async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  if(!window.pdfjsLib){ throw new Error("pdf.js not loaded"); }
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let text = "";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it=>it.str).join(" ") + "\n";
  }
  return text;
}

/* ---------- Document-type-specific extractors ---------- */
function normText(text){ return text.replace(/\s+/g," ").trim(); }
function extractNum(s){ if(!s) return NaN; return parseFloat(s.replace(/,/g,"")); }

function extractForm16Fields(text){
  const n = normText(text);
  const fields = [];
  const seen = new Set();
  function add(label, pat, gi){
    gi = gi||1;
    if(seen.has(label)) return;
    const m = n.match(pat);
    if(m && m[gi]){
      const raw = m[gi].replace(/,/g,"");
      const val = parseFloat(raw);
      if(!isNaN(val)){ fields.push({label, value:val, confidence:"high", used:false}); seen.add(label); }
    }
  }
  function addMulti(label, pat){
    const m = n.match(pat);
    if(m){
      for(let gi=1;gi<m.length;gi++){
        if(m[gi]!==undefined){
          const raw = m[gi].replace(/,/g,"");
          const val = parseFloat(raw);
          if(!isNaN(val)){
            const suffix = gi>1 ? " (Deductible)" : " (Gross)";
            fields.push({label:label+suffix, value:val, confidence:"high", used:false});
          }
        }
      }
    }
  }
  /* --- Part A: quarterly table summary row --- */
  add("Gross Salary (Part A)", /Total \(Rs\.?\)\s+[\d,.]+\s+[\d,.]+\s+([\d,]+(?:\.\d+)?)/i);
  add("TDS (Part A)", /Total \(Rs\.?\)\s+([\d,]+(?:\.\d+)?)/i);
  /* Also try generic Part A total pattern */
  add("Gross Salary (Part A alt)", /has been deducted and a sum of Rs\.\s*([\d,]+(?:\.\d+)?)/i);
  /* --- Part B: Gross Salary --- */
  add("Gross Salary", /salary as per provisions contained in section 17[\s\S]{0,40}?([\d,]{5,}(?:\.\d+)?)/i);
  add("Gross Salary (fallback)", /1\s*\(\s*d\s*\)\s*Total[\s\S]{0,20}?([\d,]+(?:\.\d+)?)/i);
  add("Gross Salary (fallback2)", /Gross Salary[\s\S]{0,40}?([\d,]{5,}(?:\.\d+)?)/i);
  /* --- Exempt Allowances (line 2i): match after "under section 10" to skip the section number --- */
  add("Exempt Allowances", /Allowances to the extent exempt[\s\S]{0,40}?under section 10\s+([\d,]+(?:\.\d+)?)/i);
  add("Exempt Allowances (fallback)", /exemption claimed under section 10[\s\S]{0,40}?([\d,]+(?:\.\d+)?)/i);
  /* --- Standard Deduction --- */
  add("Standard Deduction", /standard deduction under section 16[\s\S]{0,40}?([\d,]{3,}(?:\.\d+)?)/i);
  add("Standard Deduction (fallback)", /under section 16[\s\S]{0,15}?([\d,]{3,}(?:\.\d+)?)/i);
  /* --- Professional Tax --- */
  add("Professional Tax", /tax on employment under section 16[\s\S]{0,30}?([\d,]+(?:\.\d+)?)/i);
  /* --- Income from Salary (line 6): use greedy + word boundary to find the LAST standalone large number --- */
  add("Income from Salary", /Income chargeable under the head[\s\S]{0,200}\b([\d,]{5,}(?:\.\d+)?)/i);
  /* --- House Property / Other Sources for TDS --- */
  add("Other Sources (TDS)", /Income under the head Other Sources[\s\S]{0,40}?([\d,]+(?:\.\d+)?)/i);
  /* --- Gross Total Income (line 9): number BEFORE "Gross total income" --- */
  add("Gross Total Income", /([\d,]{5,}(?:\.\d+)?)\s*Gross total income/i);
  add("Gross Total Income (alt)", /Gross total income[\s\S]{0,30}?([\d,]{5,}(?:\.\d+)?)/i);
  /* --- Chapter VI-A Deductions --- */
  addMulti("80C Deduction", /80C[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80CCC Deduction", /80CCC[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80CCD(1) Deduction", /80CCD\s*\(\s*1\s*\)[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80CCD(1B) Deduction", /80CCD\s*\(\s*1B\s*\)[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80CCD(2) Deduction", /80CCD\s*\(\s*2\s*\)[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80D Deduction", /section\s+80D[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80D Deduction (fallback)", /80D[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80E Deduction", /section\s+80E[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80CCH Deduction", /80CCH[\s\S]{0,80}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80G Deduction", /section\s+80G[\s\S]{0,100}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  addMulti("80TTA Deduction", /section\s+80TTA[\s\S]{0,100}?([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)/i);
  add("Total Chapter VI-A Deductions", /Aggregate of deductible amount[\s\S]{0,120}?([\d,]+(?:\.\d+)?)/i);
  /* --- Taxable Income (line 12): two amounts appear BEFORE "Total taxable income" label --- */
  add("Taxable Income", /(\d+\.\d{2})\s*([\d]+\.\d{2})\s+Total taxable income/i, 2);
  /* --- Cess (line 16): "16." followed by amount --- */
  add("Cess", /16\.\s*([\d,]+(?:\.\d+)?)/i);
  add("Cess (fallback)", /Health and education cess[\s\S]{0,40}?([\d,]+(?:\.\d+)?)/i);
  /* --- Tax Payable (line 17): look for large number after "Tax payable" --- */
  add("Tax Payable", /Tax payable[\s\S]{0,80}?([\d,]{5,}(?:\.\d+)?)/i);
  /* --- TDS: look near "Net tax payable" for the large number (TDS appears at line 20 near net tax) --- */
  add("TDS", /Net tax payable[\s\S]{0,40}?([\d,]{5,}(?:\.\d+)?)/i);
  add("TDS (fallback)", /Tax deducted at source[\s\S]{0,150}?([\d,]{5,}(?:\.\d+)?)/i);
  /* --- PAN and TAN --- */
  const panM = n.match(/PAN[:\s]*of Employee[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i) || n.match(/PAN[:\s]*of the Employee[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i) || n.match(/PAN[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i);
  if(panM) fields.push({label:"PAN", value:panM[1], confidence:"high", used:false});
  const tanM = n.match(/TAN[:\s]*of Employer[:\s]*([A-Z]{4}[0-9]{5}[A-Z])/i) || n.match(/TAN[:\s]*of the Deductor[:\s]*([A-Z]{4}[0-9]{5}[A-Z])/i) || n.match(/TAN[:\s]*([A-Z]{4}[0-9]{5}[A-Z])/i);
  if(tanM) fields.push({label:"Employer/TAN", value:tanM[1], confidence:"high", used:false});
  /* --- Employer Name --- */
  const empM = n.match(/Name and address of the Employer[^A-Z]*([A-Z][A-Z\s,.\-]+?)(?:\s+(?:NO|Plot|Flat|Door|Building|Address|PAN))/i);
  if(empM) fields.push({label:"Employer Name", value:empM[1].trim(), confidence:"medium", used:false});
  return fields;
}

function extractAISFields(text){
  const n = normText(text);
  const fields = [];
  function add(label, pat, gi){
    gi = gi||1;
    const m = n.match(pat);
    if(m && m[gi]){
      const raw = m[gi].replace(/,/g,"");
      const val = parseFloat(raw);
      if(!isNaN(val)) fields.push({label, value:val, confidence:"high", used:false});
    }
  }
  /* Source-code based extraction (AIS uses codes like SAL, INT, DIV) */
  add("Salary", /\bSAL\b[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("Interest", /\bINT\b[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("Dividend", /\bDIV\b[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("TDS", /\bTDS\b[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  /* Label-based extraction */
  add("Salary (alt)", /salary[\s\S]{0,80}?([\d,]+(?:\.\d+)?)/i);
  add("Interest (alt)", /interest[\s\S]{0,80}?([\d,]+(?:\.\d+)?)/i);
  add("Dividend (alt)", /dividend[\s\S]{0,80}?([\d,]+(?:\.\d+)?)/i);
  add("TDS (alt)", /total tax deducted[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("Advance Tax", /advance tax[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  /* AIS summary totals */
  add("Salary (AIS Total)", /Gross Salary[\s\S]{0,100}?([\d,]+(?:\.\d+)?)/i);
  add("Interest (AIS Total)", /Income from Other Sources[\s\S]{0,100}?([\d,]+(?:\.\d+)?)/i);
  /* PAN */
  const panM = n.match(/PAN[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i);
  if(panM) fields.push({label:"PAN", value:panM[1], confidence:"high", used:false});
  return fields;
}

function extract26ASFields(text){
  const n = normText(text);
  const fields = [];
  function add(label, pat, gi){
    gi = gi||1;
    const m = n.match(pat);
    if(m && m[gi]){
      const raw = m[gi].replace(/,/g,"");
      const val = parseFloat(raw);
      if(!isNaN(val)) fields.push({label, value:val, confidence:"high", used:false});
    }
  }
  /* 26AS Part I: Match TAN followed by three amounts (Amount Paid, Tax Deducted, TDS Deposited) */
  add("TDS (26AS)", /[A-Z]{4}\d{5}[A-Z](\d+\.\d{2})(\d+\.\d{2})(\d+\.\d{2})/i, 2);
  add("TDS (26AS alt)", /Total Tax Deducted[^0-9]*([\d,]+(?:\.\d+)?)/i);
  add("Advance Tax", /advance tax[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("Self-Assessment Tax", /self.assessment tax[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  add("TCS", /tax collected at source[\s\S]{0,60}?([\d,]+(?:\.\d+)?)/i);
  /* PAN */
  const panM = n.match(/PAN[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i);
  if(panM) fields.push({label:"PAN", value:panM[1], confidence:"high", used:false});
  return fields;
}

function extractInterestCertificateFields(text){
  const n = normText(text);
  const fields = [];
  function add(label, pat, gi){
    gi = gi||1;
    const m = n.match(pat);
    if(m && m[gi]){
      const raw = m[gi].replace(/,/g,"");
      const val = parseFloat(raw);
      if(!isNaN(val)) fields.push({label, value:val, confidence:"high", used:false});
    }
  }
  /* Credit Interest (HDFC format: "Credit Interest : INR 13503.0") */
  add("Interest from Savings", /Credit Interest\s*:\s*(?:INR|Rs\.?)?\s*([\d,]+(?:\.\d+)?)/i);
  add("Interest from Savings (alt)", /interest[^0-9]*(?:INR|Rs\.?)?\s*([\d,]+(?:\.\d+)?)/i);
  /* Period */
  const periodM = n.match(/Period\s*:\s*(\d{2}\/\d{2}\/\d{4})\s+to\s+(\d{2}\/\d{2}\/\d{4})/i);
  if(periodM) fields.push({label:"Period", value:periodM[1]+" to "+periodM[2], confidence:"high", used:false});
  /* Account number */
  const accM = n.match(/Account\s*(?:number|#)\s*[:\s]*(\d{5,})/i);
  if(accM) fields.push({label:"Account Number", value:accM[1], confidence:"medium", used:false});
  return fields;
}

function extractChallanFields(text){
  const n = normText(text);
  const fields = [];
  function add(label, pat, gi){
    gi = gi||1;
    const m = n.match(pat);
    if(m && m[gi]){
      const raw = m[gi].replace(/,/g,"");
      const val = parseFloat(raw);
      if(!isNaN(val)) fields.push({label, value:val, confidence:"high", used:false});
    }
  }
  /* Challan amount (format: "Amount (in Rs.) :₹ 6,200") */
  add("Self-Assessment Tax", /Amount\s*\(in Rs\.?\)\s*:\s*₹?\s*([\d,]+(?:\.\d+)?)/i);
  /* Also check Minor Head for tax type */
  const minorM = n.match(/Minor Head\s*:\s*([\w\s\-]+?)\s*\(\d+\)/i);
  const isSelfAssessment = minorM && /self.?assessment/i.test(minorM[1]);
  if(!isSelfAssessment){
    /* If not self-assessment, relabel as advance tax */
    const f = fields.find(f=>f.label==="Self-Assessment Tax");
    if(f) f.label = "Advance Tax";
  }
  /* CIN */
  const cinM = n.match(/CIN\s*[:\s]*(\d{14})/i);
  if(cinM) fields.push({label:"CIN", value:cinM[1], confidence:"high", used:false});
  /* BSR Code */
  const bsrM = n.match(/BSR\s*(?:code)?\s*[:\s]*(\d{7})/i);
  if(bsrM) fields.push({label:"BSR Code", value:bsrM[1], confidence:"medium", used:false});
  /* Date */
  const dateM = n.match(/Date of Deposit\s*[:\s]*(\d{2}[-\/]\w+[-\/]\d{4})/i) || n.match(/Tender Date\s*[:\s]*(\d{2}[-\/]\d{2}[-\/]\d{4})/i);
  if(dateM) fields.push({label:"Payment Date", value:dateM[1], confidence:"medium", used:false});
  /* PAN */
  const panM = n.match(/PAN\s*[:\s]*([A-Z]{5}[0-9]{4}[A-Z])/i);
  if(panM) fields.push({label:"PAN", value:panM[1], confidence:"high", used:false});
  /* Assessment Year */
  const ayM = n.match(/Assessment Year\s*[:\s]*(\d{4}-\d{4})/i);
  if(ayM) fields.push({label:"Assessment Year", value:ayM[1], confidence:"medium", used:false});
  return fields;
}

function extractFieldsFromText(text, docType){
  if(docType==="form16") return extractForm16Fields(text);
  if(docType==="ais"||docType==="tis") return extractAISFields(text);
  if(docType==="form26as") return extract26ASFields(text);
  if(docType==="interest") return extractInterestCertificateFields(text);
  if(docType==="challan") return extractChallanFields(text);
  return extractGenericFields(text);
}

/* ---------- Auto-apply extracted values to STATE ---------- */
function autoApplyExtractedFields(doc){
  if(!doc.extractedFields||doc.extractedFields.length===0) return;
  const docName = doc.name.replace(/\.[a-zA-Z0-9]+$/,"");
  let applied = 0;
  function ensureEmployer(){
    if(!STATE.income.salary.employers.length){
      STATE.income.salary.employers.push({employerName:docName, grossSalary:0, exemptGeneral:0, exemptOldRegimeOnly:0, professionalTax:0, tds:0});
    }
    return STATE.income.salary.employers[0];
  }
  function applyField(f){
    if(f.used) return;
    const lbl = f.label;
    /* --- String fields --- */
    if(typeof f.value==="string"){
      if(lbl==="PAN"){ STATE.personal.pan = f.value; f.used=true; applied++; return; }
      if(lbl==="Employer/TAN"){ ensureEmployer().employerName = docName+" ("+f.value+")"; f.used=true; applied++; return; }
      if(lbl==="Employer Name"){ ensureEmployer().employerName = f.value; f.used=true; applied++; return; }
      return;
    }
    if(typeof f.value!=="number") return;
    /* --- Salary fields --- */
    if(lbl==="Gross Salary"||lbl==="Gross Salary (fallback)"||lbl==="Gross Salary (s17)"||lbl==="Gross Salary (Part A Total)"||lbl==="Gross Salary (fallback2)"){
      ensureEmployer().grossSalary = f.value;
      f.used = true; applied++;
    } else if(lbl==="Salary"||lbl==="Salary (alt)"||lbl==="Salary (AIS Total)"){
      ensureEmployer().grossSalary = f.value;
      f.used = true; applied++;
    } else if(lbl==="Exempt Allowances"||lbl==="Exempt Allowances (fallback)"){
      ensureEmployer().exemptGeneral = f.value;
      f.used = true; applied++;
    } else if(lbl==="Professional Tax"||lbl==="Professional Tax (fallback)"){
      ensureEmployer().professionalTax = f.value;
      f.used = true; applied++;
    }
    /* --- TDS fields --- */
    else if(lbl==="TDS"||lbl==="TDS (fallback)"||lbl==="TDS (Part A Total)"||lbl==="TDS (alt)"){
      /* Deduplicate: skip if same source+amount already exists */
      const dup = STATE.taxPayments.tds.find(t=>t.source===docName && Math.abs(t.amount-f.value)<1);
      if(!dup) STATE.taxPayments.tds.push({id:uid(), source:docName, amount:f.value});
      f.used = true; applied++;
    }
    /* --- Other Sources: Interest --- */
    else if(lbl==="Interest"||lbl==="Interest (alt)"||lbl==="Interest (AIS Total)"||lbl==="Interest from Savings"){
      const existing = STATE.income.otherSources.items.find(it=>it.kind==="savings"&&it.label===docName);
      if(existing){ existing.amount = f.value; } else {
        STATE.income.otherSources.items.push({id:uid(), kind:"savings", label:docName, amount:f.value});
      }
      f.used = true; applied++;
    }
    /* --- Other Sources: Dividend --- */
    else if(lbl==="Dividend"||lbl==="Dividend (alt)"){
      const existing = STATE.income.otherSources.items.find(it=>it.kind==="dividend"&&it.label===docName);
      if(existing){ existing.amount = f.value; } else {
        STATE.income.otherSources.items.push({id:uid(), kind:"dividend", label:docName, amount:f.value});
      }
      f.used = true; applied++;
    }
    /* --- Tax Payments --- */
    else if(lbl==="Advance/Self-Assessment Tax"||lbl==="Self-Assessment Tax"){
      const dup = STATE.taxPayments.selfAssessmentTax.find(t=>Math.abs(t.amount-f.value)<1);
      if(!dup) STATE.taxPayments.selfAssessmentTax.push({id:uid(), date:"", amount:f.value});
      f.used = true; applied++;
    } else if(lbl==="Advance Tax"){
      STATE.taxPayments.advanceTax.push({id:uid(), date:"", amount:f.value, quarter:"Q4"});
      f.used = true; applied++;
    }
    /* --- Deductions (Chapter VI-A) --- */
    else if(lbl.includes("80C Deduction")&&lbl.includes("Deductible")){
      STATE.deductions.s80C = Math.max(STATE.deductions.s80C||0, f.value);
      f.used = true; applied++;
    } else if(lbl.includes("80CCD(1B)")&&lbl.includes("Deductible")){
      STATE.deductions.s80CCD1B = Math.max(STATE.deductions.s80CCD1B||0, f.value);
      f.used = true; applied++;
    } else if(lbl.includes("80CCD(2)")&&lbl.includes("Deductible")){
      STATE.deductions.s80CCD2 = Math.max(STATE.deductions.s80CCD2||0, f.value);
      f.used = true; applied++;
    } else if(lbl.includes("80D Deduction")&&lbl.includes("Deductible")){
      STATE.deductions.s80D_self = Math.max(STATE.deductions.s80D_self||0, f.value);
      f.used = true; applied++;
    } else if(lbl.includes("80E Deduction")&&lbl.includes("Deductible")){
      STATE.deductions.s80E = Math.max(STATE.deductions.s80E||0, f.value);
      f.used = true; applied++;
    } else if(lbl.includes("80G Deduction")&&lbl.includes("Deductible")){
      if(STATE.deductions.s80G.length===0){
        STATE.deductions.s80G.push({id:uid(), doneeName:docName, doneePAN:"", amount:f.value, eligiblePct:50});
      } else { STATE.deductions.s80G[0].amount = Math.max(STATE.deductions.s80G[0].amount||0, f.value); }
      f.used = true; applied++;
    }
  }
  doc.extractedFields.forEach(applyField);
  if(applied>0) toast("Auto-applied "+applied+" field"+(applied>1?"s":"")+" from "+doc.name);
}

function applyDocField(docId, fieldIdx){
  const doc = STATE.documents.find(d=>d.id===docId);
  if(!doc || !doc.extractedFields || !doc.extractedFields[fieldIdx]) return;
  const f = doc.extractedFields[fieldIdx];
  const label = f.label;
  const docName = doc.name.replace(/\.[a-zA-Z0-9]+$/,"");
  function ensureEmployer(){
    if(!STATE.income.salary.employers.length){
      STATE.income.salary.employers.push({employerName:docName, grossSalary:0, exemptGeneral:0, exemptOldRegimeOnly:0, professionalTax:0, tds:0});
    }
  }
  if(typeof f.value==="string"){
    if(label==="PAN"){ STATE.personal.pan = f.value; }
    else if(label==="Employer/TAN"){ ensureEmployer(); STATE.income.salary.employers[0].employerName = docName+" ("+f.value+")"; }
    else if(label==="Employer Name"){ ensureEmployer(); STATE.income.salary.employers[0].employerName = f.value; }
    else { toast("Field '"+label+"' noted — verify manually."); f.used=true; saveState(); render(); return; }
  } else if(typeof f.value==="number"){
    if(label==="Salary"||label==="Gross Salary"||label==="Gross Salary (fallback)"||label==="Gross Salary (s17)"||label==="Gross Salary (Part A Total)"||label==="Gross Salary (fallback2)"||label==="Salary (alt)"||label==="Salary (AIS Total)"){

      STATE.deductions.s80CCD1B = Math.max(STATE.deductions.s80CCD1B||0, f.value);

      } else { STATE.deductions.s80G[0].amount = Math.max(STATE.deductions.s80G[0].amount||0, f.value); }
    } else {
      toast("Field '"+label+"' noted — verify in Income & Deductions step.");
      f.used = true; saveState(); render(); return;
    }
  }
  f.used = true; saveState(); render();
  toast("Applied "+label+" ("+INR(f.value)+") from "+doc.name);
}

async function handleFileUpload(file, docTypeKey){
  const id = uid();
  const doc = { id, name:file.name, type:docTypeKey, format: file.name.split(".").pop().toUpperCase(),
    parseStatus:"pending", extractedFields:[], uploadedAt:Date.now(), sizeKB: Math.round(file.size/1024) };
  STATE.documents.push(doc);
  saveState(); render();
  try{
    if(/\.csv$/i.test(file.name)){
      const text = await file.text();
      const {headers, rows} = parseCSVText(text);
      doc.parseStatus = rows.length>0 ? "success":"partial";
      doc.extractedFields = [{label:"Rows parsed", value:rows.length, confidence:"high", used:true}];
      doc.csvHeaders = headers; doc.csvRows = rows.slice(0,500);
    } else if(/\.json$/i.test(file.name)){
      const text = await file.text();
      try{
        const obj = JSON.parse(text);
        doc.parseStatus = "success";
        doc.extractedFields = [{label:"JSON keys", value:Object.keys(obj).length, confidence:"high", used:true}];
        doc.rawJSON = obj;
      }catch(e){ doc.parseStatus="failed"; }
    } else if(/\.pdf$/i.test(file.name)){
      const text = await extractPdfText(file);
      if(text.trim().length<20){
        doc.parseStatus = "failed";
        doc.note = "No extractable text layer found (likely a scanned PDF). Please use manual entry for this document.";
      } else {
        const fields = extractFieldsFromText(text, docTypeKey);
        doc.extractedFields = fields;
        doc.parseStatus = fields.length>0 ? "success" : "partial";
        doc.rawTextSnippet = text.slice(0,4000);
        autoApplyExtractedFields(doc);
      }
    } else {
      doc.parseStatus = "failed";
      doc.note = "Unsupported format for automatic parsing — use manual entry.";
    }
  }catch(err){
    doc.parseStatus = "failed";
    doc.note = "Parsing error: "+err.message;
  }
  saveState(); render();
  toast(doc.parseStatus==="success" ? `${file.name} parsed successfully` : `${file.name} needs manual review`);
}

function getPath(obj, path){
  return path.split(".").reduce((o,k)=> (o==null?undefined:o[k.match(/^\d+$/)?Number(k):k]), obj);
}
function setPath(obj, path, value){
  const keys = path.split(".");
  let o = obj;
  for(let i=0;i<keys.length-1;i++){
    const k = keys[i].match(/^\d+$/) ? Number(keys[i]) : keys[i];
    if(o[k]==null) o[k] = keys[i+1].match(/^\d+$/) ? [] : {};
    o = o[k];
  }
  const lastKey = keys[keys.length-1];
  o[lastKey.match(/^\d+$/)?Number(lastKey):lastKey] = value;
}

  STATE.wizard.currentStep = n;
  saveState(); render();
  window.scrollTo(0,0);
}

/* ---------------- STEP 4 : Tax Result ---------------- */
function computationSheetRows(res, pay){
  const rows = [];
  rows.push(["1","Gross Salary — as per Section 17(1)", res.salaryCalc.gross, false]);
  rows.push(["2","Less: Allowances exempt u/s 10 (incl. HRA if old regime)", res.salaryCalc.exemptBoth + res.salaryCalc.exemptOldOnly + res.salaryCalc.hraExempt, false]);
  rows.push(["3","Balance (1 − 2)", res.salaryCalc.gross - (res.salaryCalc.exemptBoth+res.salaryCalc.exemptOldOnly+res.salaryCalc.hraExempt), false]);
  rows.push(["4(a)","Standard Deduction u/s 16(ia)", res.salaryCalc.standardDeduction, false]);
  rows.push(["4(b)","Professional Tax u/s 16(iii)", res.salaryCalc.profTax, false]);
  rows.push(["5","Aggregate of deductions u/s 16 [4(a)+4(b)]", res.salaryCalc.standardDeduction + res.salaryCalc.profTax, false]);
  rows.push(["6","Income chargeable under the head \"Salaries\" (3 − 5)", res.salaryCalc.net, true]);
  rows.push(["7","Income from House Property", res.hpCalc.incomeForGTI, false]);
  rows.push(["8","Income from Other Sources + Capital Gains taxed at slab rate", res.osCalc.normalOtherIncome + res.capGainsCalc.ST_slab_addToGTI, false]);
  rows.push(["9","Gross Total Income (6 + 7 + 8)", res.gti, true]);
  rows.push(["10","Deductions under Chapter VI-A", res.dedCalc.total, false]);
  rows.push(["11","Total Taxable Income (normal rate) (9 − 10)", res.taxableNormal, true]);
  rows.push(["12","Tax on Total Income (slab rates)", res.taxOnNormal, false]);
  rows.push(["13","Less: Rebate u/s 87A" + (res.rebate>0?"":" (not applicable — income above threshold)"), res.rebate, false]);
  rows.push(["14","Add: Tax on Special-Rate Income (Capital Gains / Lottery)", res.specialTax, false]);
  rows.push(["15","Add: Surcharge", res.surcharge, false]);
  rows.push(["16","Add: Health &amp; Education Cess (4%)", res.cess, false]);
  rows.push(["17","Total Tax Liability (12 − 13 + 14 + 15 + 16)", res.totalTaxLiability, true]);
  rows.push(["18","Less: TDS + TCS", pay.tds+pay.tcs, false]);
  rows.push(["19","Less: Advance Tax", pay.advTotal, false]);
  rows.push(["19a","Less: Self-Assessment Tax", pay.saTotal, false]);
  rows.push(["20","Add: Interest u/s 234A/234B/234C", pay.totalInterest, false]);
  return rows;
}

  const res = computeRegime(STATE, regime);

  const pay = calcPaymentsAndInterest(STATE, res, STATE.wizard.intendedFilingDate);
  const itr = recommendITR(STATE);
  const rows = computationSheetRows(res, pay);
  const winnerRegime = other.totalTaxLiability < res.totalTaxLiability ? (regime==="old"?"new":"old") : regime;
  return `
  <div class="step-header">
