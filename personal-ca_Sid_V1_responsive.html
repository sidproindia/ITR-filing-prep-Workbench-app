function wireStepEvents(step){
  if(step===2){
    const dz = document.getElementById("dropzone");
    const fi = document.getElementById("fileInput");
    if(dz && fi){
      dz.addEventListener("click", ()=> fi.click());
      dz.addEventListener("dragover", e=>{ e.preventDefault(); dz.classList.add("dragover"); });
      dz.addEventListener("dragleave", ()=> dz.classList.remove("dragover"));
      dz.addEventListener("drop", e=>{
        e.preventDefault(); dz.classList.remove("dragover");
        const f = e.dataTransfer.files[0];
        if(f) handleFileUpload(f, document.getElementById("docTypeSelect").value);
      });
      fi.addEventListener("change", ()=>{
        const f = fi.files[0];
        if(f) handleFileUpload(f, document.getElementById("docTypeSelect").value);
        fi.value = "";
      });
    }
  }
}

function coerceValue(input){
  if(input.type==="checkbox") return input.checked;
  if(input.dataset.type==="bool") return input.value==="true";
  if(input.type==="number") return input.value===""?0:Number(input.value);
  return input.value;
}

function globalInputHandler(e){
  const t = e.target;
  if(!t.matches("[data-bind]")) return;
  const path = t.dataset.bind;
  setPath(STATE, path, coerceValue(t));
}
function globalChangeHandler(e){
  const t = e.target;
  if(!t.matches("[data-bind]")) return;
  const path = t.dataset.bind;
  setPath(STATE, path, coerceValue(t));
  saveState();
  render();
}
function globalClickHandler(e){
  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.dataset.action;
  const arr = (path, def) => { const a = getPath(STATE, path); return a; };
  switch(action){
    case "next": nextStep(); break;
    case "prev": prevStep(); break;
    case "goto2": gotoStep(2); break;
    case "add-employer": STATE.income.salary.employers.push({employerName:"",grossSalary:0,exemptGeneral:0,exemptOldRegimeOnly:0,professionalTax:0,tds:0}); saveState(); render(); break;
    case "rm-employer": STATE.income.salary.employers.splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "add-hp": STATE.income.houseProperty.properties.push({type:"self",address:"",ownershipPct:100,rentReceived:0,municipalValue:0,fairRent:0,standardRent:0,municipalTaxesPaid:0,homeLoanInterest:0,preConstructionInterest:0}); saveState(); render(); break;
    case "rm-hp": STATE.income.houseProperty.properties.splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "add-cg": STATE.income.capitalGains.transactions.push({assetClass:"equityMF",acquireDate:"",saleDate:"",saleValue:0,costOfAcquisition:0,costOfImprovement:0,expenses:0,fmv31Jan2018:0,exemptionClaimed:0}); saveState(); render(); break;
    case "rm-cg": STATE.income.capitalGains.transactions.splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "add-os": STATE.income.otherSources.items.push({id:uid(),kind:"savings",label:"",amount:0}); saveState(); render(); break;
    case "rm-os": STATE.income.otherSources.items.splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "add-80g": STATE.deductions.s80G.push({id:uid(),doneeName:"",doneePAN:"",amount:0,eligiblePct:50}); saveState(); render(); break;
    case "rm-80g": STATE.deductions.s80G.splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "add-tds": STATE.taxPayments.tds.push({id:uid(),source:"",amount:0}); saveState(); render(); break;
    case "add-tcs": STATE.taxPayments.tcs.push({id:uid(),source:"",amount:0}); saveState(); render(); break;
    case "add-advance": STATE.taxPayments.advanceTax.push({id:uid(),date:"",amount:0,quarter:"Q1"}); saveState(); render(); break;
    case "add-sa": STATE.taxPayments.selfAssessmentTax.push({id:uid(),date:"",amount:0}); saveState(); render(); break;
    case "rm-pay": STATE.taxPayments[btn.dataset.kind].splice(Number(btn.dataset.i),1); saveState(); render(); break;
    case "set-regime": STATE.regimeSelected = btn.dataset.regime; saveState(); render(); break;
    case "remove-doc": STATE.documents = STATE.documents.filter(d=>d.id!==btn.dataset.id); saveState(); render(); break;
    case "resolve-mismatch": {
      const note = (document.getElementById("note_"+btn.dataset.id)||{}).value || "Reviewed";

      saveState(); render();
      break;
    }
    case "download-pdf": generatePDFReport(); break;
    case "download-json": generateITRJSON(); break;
    case "apply-field": applyDocField(btn.dataset.doc, Number(btn.dataset.idx)); break;
  }
}

function exportProject(){
  const blob = new Blob([JSON.stringify(STATE,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download = `PersonalCA_Project_${STATE.meta.ay}_${(STATE.personal.name||"taxpayer").replace(/\s+/g,"_")}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Project exported");
}
function importProjectFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      STATE = Object.assign(defaultState(), obj);
      saveState(); render();
      toast("Project imported");
    }catch(e){ alert("Could not read this file — is it a PERSONAL CA project export?"); }
  };
  reader.readAsText(file);
}

/* --- Drawer Toggle --- */
function toggleDrawer(open){
  var sidebar = document.getElementById("sidebar");
  var overlay = document.getElementById("drawerOverlay");
  if(open === undefined) open = !sidebar.classList.contains("open");
  if(open){
    sidebar.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  } else {
    sidebar.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }
}

    /* Sidebar step items close drawer after navigation */

    if(stepList) stepList.addEventListener("click", function(){
      if(window.innerWidth < 768) toggleDrawer(false);
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", wireMobileDrawer);
  } else {
    wireMobileDrawer();
  }
})();

</script>
